name: 'Deploy to Fly.io'
on:
  workflow_run:
    workflows: ['Push Image']
    types: ['completed']
jobs:
  deploy:
    name: 'Deploy to Fly.io'
    runs-on: 'ubuntu-latest'
    concurrency: 'deploy-group'
    if: "${{ github.event.workflow_run.conclusion == 'success' }}"
    env:
      FLY_API_TOKEN: "${{ secrets.FLY_API_TOKEN }}"
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
      - name: 'Setup flyctl'
        uses: 'superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1'
      - name: 'Set scale count'
        run: 'flyctl scale count 1'
      - name: 'Deploy to Fly.io'
        run: 'flyctl deploy --image ghcr.io/attacktive/troubleshooter-editor-back-end:latest --ha=false'
